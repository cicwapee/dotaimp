<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Dota 2 Imposter</title>
<style>
    /* Глобальні налаштування та анімований фон */
    body {
        background: linear-gradient(135deg, #060913 0%, #0b1121 50%, #150a1d 100%);
        color: #f3f4f6;
        font-family: 'Inter', 'Segoe UI', Arial, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
        padding: 16px; /* Трохи менший паддінг для мобільних */
        overflow-x: hidden;
        position: relative;
        box-sizing: border-box;
    }

    /* Фоновий ефект світіння */
    body::before {
        content: '';
        position: fixed;
        top: -10%;
        left: -10%;
        width: 120%;
        height: 120%;
        background: radial-gradient(circle, rgba(255, 204, 0, 0.05) 0%, rgba(255, 77, 77, 0.03) 50%, transparent 100%);
        z-index: 0;
        pointer-events: none;
    }

    h1 {
        font-size: 32px; /* Зменшено для мобільних екранів */
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: 2px;
        background: linear-gradient(90deg, #ffcc00, #ff4d4d);
        background-clip: text;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-top: 10px;
        margin-bottom: 20px;
        text-shadow: 0 0 30px rgba(255, 204, 0, 0.2);
        z-index: 1;
        text-align: center;
    }

    /* Скляна картка (Glassmorphism) */
    .card {
        background: rgba(21, 27, 45, 0.7);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        padding: 24px; /* Компактніші відступи */
        border-radius: 16px;
        width: 100%;
        max-width: 440px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
        margin-bottom: 20px;
        box-sizing: border-box;
        z-index: 1;
        transition: all 0.3s ease;
    }

    label {
        display: block;
        margin-top: 16px;
        font-weight: 700;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: #9ca3af;
    }

    /* Кастомні інпути з підсвіткою */
    input, select {
        width: 100%;
        padding: 14px;
        margin-top: 8px;
        border-radius: 10px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(10, 14, 26, 0.8);
        color: #fff;
        font-size: 15px;
        box-sizing: border-box;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: inset 0 2px 4px rgba(0,0,0,0.4);
        font-family: inherit;
    }
    input:focus, select:focus {
        border-color: #ffcc00;
        box-shadow: 0 0 15px rgba(255, 204, 0, 0.25), inset 0 2px 4px rgba(0,0,0,0.4);
        outline: none;
    }

    /* Кнопки з градієнтом */
    button {
        width: 100%;
        padding: 16px;
        margin-top: 25px;
        background: linear-gradient(135deg, #ffcc00 0%, #ffaa00 100%);
        border: none;
        border-radius: 10px;
        font-weight: 800;
        font-size: 15px;
        text-transform: uppercase;
        letter-spacing: 1px;
        cursor: pointer;
        color: #030712;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 0 8px 20px rgba(255, 170, 0, 0.3);
        font-family: inherit;
        -webkit-tap-highlight-color: transparent; /* Прибирає синій спалах при тапі на айфонах */
    }
    button:hover {
        background: linear-gradient(135deg, #ffe066 0%, #ffcc00 100%);
        transform: translateY(-2px);
        box-shadow: 0 12px 25px rgba(255, 204, 0, 0.5);
    }
    button:active {
        transform: translateY(0);
    }

    /* Екран відображення ролі */
    .role-box {
        background: rgba(26, 32, 56, 0.75);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        padding: 35px 24px; /* Адаптовано під вузькі екрани */
        border-radius: 20px;
        text-align: center;
        margin-top: 10px;
        width: 100%;
        max-width: 440px;
        box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
        box-sizing: border-box;
        z-index: 1;
    }
    
    .role {
        font-size: 32px; /* Злегка зменшено для довгих назв */
        font-weight: 900;
        margin: 25px 0;
        letter-spacing: 1px;
        text-transform: uppercase;
        word-wrap: break-word; /* Щоб довгі слова не вилазили за край */
    }

    /* Стиль та тремтіння Імпостера */
    .imposter {
        color: #ff4d4d;
        text-shadow: 0 0 25px rgba(255, 77, 77, 0.9), 0 0 50px rgba(255, 77, 77, 0.4);
        animation: criticalShake 0.3s infinite;
    }

    /* Стиль та левітація Мирного */
    .hero {
        color: #00d2ff;
        text-shadow: 0 0 25px rgba(0, 210, 255, 0.8), 0 0 45px rgba(0, 210, 255, 0.3);
        animation: neonFloat 2.5s ease-in-out infinite;
    }

    /* Анімації */
    .fade-in {
        animation: superReadyIn 0.45s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
    .pulse-btn {
        animation: cyberPulse 2s infinite;
    }

    .error {
        color: #ff4d4d;
        font-size: 13px;
        font-weight: 600;
        margin-top: 10px;
        display: none;
        text-shadow: 0 0 10px rgba(255,77,77,0.3);
    }

    /* Медіа-запит для зовсім маленьких екранів (наприклад, iPhone SE) */
    @media (max-width: 375px) {
        h1 { font-size: 28px; }
        .role { font-size: 26px; }
        .card, .role-box { padding: 20px 16px; }
        button { padding: 14px; font-size: 14px; }
    }

    /* Ключові кадри ефектів */
    @keyframes superReadyIn {
        from { opacity: 0; transform: scale(0.92) translateY(15px); }
        to { opacity: 1; transform: scale(1) translateY(0); }
    }
    @keyframes cyberPulse {
        0% { box-shadow: 0 0 0 0 rgba(255, 170, 0, 0.6); }
        70% { box-shadow: 0 0 0 12px rgba(255, 170, 0, 0); }
        100% { box-shadow: 0 0 0 0 rgba(255, 170, 0, 0); }
    }
    @keyframes neonFloat {
        0%, 100% { transform: translateY(0) scale(1); }
        50% { transform: translateY(-6px) scale(1.01); }
    }
    @keyframes criticalShake {
        0% { transform: translate(0, 0) rotate(0deg); }
        25% { transform: translate(-1px, 0.5px) rotate(-0.5deg); }
        50% { transform: translate(0.5px, -1px) rotate(0.5deg); }
        75% { transform: translate(-0.5px, -0.5px) rotate(-0.5deg); }
        100% { transform: translate(1px, 0.5px) rotate(0deg); }
    }
</style>

let roles = [];
let currentPlayer = 1;
let totalPlayers = 0;

function validateInputs() {
    const p = parseInt(document.getElementById("players").value) || 0;
    const i = parseInt(document.getElementById("imposters").value) || 0;
    const errorMsg = document.getElementById("error-msg");
    const startBtn = document.getElementById("start-btn");

    if (i >= p || p < 2 || i < 1) {
        errorMsg.style.display = "block";
        startBtn.disabled = true;
        startBtn.style.opacity = "0.4";
        return false;
    } else {
        errorMsg.style.display = "none";
        startBtn.disabled = false;
        startBtn.style.opacity = "1";
        return true;
    }
}

function startGame() {
    if (!validateInputs()) return;

    totalPlayers = parseInt(document.getElementById("players").value);
    const totalImposters = parseInt(document.getElementById("imposters").value);
    const selectedTheme = document.getElementById("theme").value;
    
    roles = [];

    for (let i = 0; i < totalImposters; i++) {
        roles.push("Imposter");
    }

    const currentPool = themesData[selectedTheme];
    const secretWord = currentPool[Math.floor(Math.random() * currentPool.length)];

    const peacefulPlayers = totalPlayers - totalImposters;
    for (let i = 0; i < peacefulPlayers; i++) {
        roles.push(secretWord);
    }

    for (let i = roles.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [roles[i], roles[j]] = [roles[j], roles[i]];
    }

    currentPlayer = 1;
    document.getElementById("setup").style.display = "none";
    showPlayerScreen();
}

function showPlayerScreen() {
    const game = document.getElementById("game");
    game.innerHTML = `
        <div class="role-box fade-in">
            <h2 style="color: #9ca3af; font-size: 13px; text-transform: uppercase; letter-spacing: 2px;">Конфіденційно</h2>
            <h1 style="font-size: 36px; margin: 15px 0 30px 0; color: #fff;">Гравець ${currentPlayer}</h1>
            <p style="color: #6b7280; font-size: 14px; margin-bottom: 25px; padding: 0 10px;">Прибери екран від очей інших тімейтів!</p>
            <button class="pulse-btn" onclick="revealRole()">Відкрити роль</button>
        </div>
    `;
}

function revealRole() {
    const role = roles[currentPlayer - 1];
    const game = document.getElementById("game");

    let roleHTML = "";
    if (role === "Imposter") {
        roleHTML = `
            <div style="font-size: 12px; color: #ff4d4d; font-weight: 800; letter-spacing: 2px;">ТВОЯ СЕКРЕТНА РОЛЬ</div>
            <div class="role imposter">IMPOSTER 🕵️‍♂️</div>
            <p style="color: #9ca3af; max-width: 365px; margin: 0 auto 25px auto; font-size: 14px; line-height: 1.5; padding: 0 5px;">
                Ти без поняття, яке слово загадано. Твій єдиний шанс — уважно слухати чужі асоціації, жорстко блефувати та копіювати чужі думки!
            </p>
        `;
    } else {
        roleHTML = `
            <div style="font-size: 12px; color: #00d2ff; font-weight: 800; letter-spacing: 2px;">СЕКРЕТНЕ СЛОВО</div>
            <div class="role hero">${role}</div>
            <p style="color: #9ca3af; max-width: 365px; margin: 0 auto 25px auto; font-size: 14px; line-height: 1.5; padding: 0 5px;">
                Ти — мирний житель. Говори точкові, завуальовані асоціації, щоб твої зрозуміли, але Імпостер не зміг одразу здогадатися.
            </p>
        `;
    }

    let nextButton = "";
    if (currentPlayer < totalPlayers) {
        nextButton = `<button onclick="nextPlayer()">Наступний гравець →</button>`;
    } else {
        nextButton = `<button style="background: linear-gradient(135deg, #10b981 0%, #059669 100%); color: white; box-shadow: 0 8px 20px rgba(16, 185, 129, 0.3);" onclick="newGame()">Катка готова! Обговорення</button>`;
    }

    game.innerHTML = `
        <div class="role-box fade-in">
            <h2 style="color: #9ca3af; font-size: 14px; text-transform: uppercase;">Гравець ${currentPlayer}</h2>
            <hr style="border: 0; height: 1px; background: rgba(255,255,255,0.08); margin-bottom: 25px;">
            ${roleHTML}
            ${nextButton}
        </div>
    `;
}

function nextPlayer() {
    currentPlayer++;
    showPlayerScreen();
}

function newGame() {
    document.getElementById("setup").style.display = "block";
    document.getElementById("game").innerHTML = "";
    validateInputs();
}
</script>
